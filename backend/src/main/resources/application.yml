spring:
  application:
    name: payment-system
  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: validate # 운영환경에서는 validate, 개발환경에서는 update 사용
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false # 지연 로딩 이슈 방지를 위해 false 설정

  # 데이터베이스 설정
  datasource:
    url: jdbc:postgresql://localhost:5432/payment_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  # Redis 설정 - 동시성 제어와 캐싱에 사용
  redis:
    host: localhost
    port: 6379
    password: null
    timeout: 2000ms
    database: 0
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5

  # Servlet 설정
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Logging 설정
logging:
  level:
    root: INFO
    com.payment: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"

# 서버 포트
server:
  port: 8080
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false

# 커스텀 설정
payment:
  # 토스페이먼츠 API 설정
  external:
    toss:
      api-url: https://api.tosspayments.com/v1
      secret-key: ${TOSS_SECRET_KEY} # 환경변수에서 읽기
      webhook-secret: ${TOSS_WEBHOOK_SECRET}

  # Idempotency Key 만료 시간 (시간)
  idempotency:
    ttl: 24
    # Redis 키 프리픽스
    key-prefix: idempotency_key

  # 결제 재시도 설정
  retry:
    max-attempts: 3
    delay-seconds: 60
    backoff-multiplier: 2.0
